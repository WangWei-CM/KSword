<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksword5.1 Overview</title>
    <!-- 总览页样式：发布会展厅风格。 -->
    <link rel="stylesheet" href="../css/site.css">
</head>
<body class="overview-page">
    <div class="page-shell">
        <header class="brand-topbar reveal-on-load" style="--reveal-delay: 20ms;">
            <a class="brand-mark" href="../index.html">Ksword5.1</a>
            <div class="topbar-actions">
                <a class="action-button" id="overview-home-link" href="../index.html" title="返回发布主页">↩ 首页</a>
                <button class="lang-button" type="button" data-lang-toggle title="切换中英文" aria-label="切换中英文">EN</button>
                <button class="icon-button" type="button" data-theme-toggle title="切换深浅模式" aria-label="切换深浅模式">☾</button>

        <section class="section-panel overview-hero reveal-on-load" style="--reveal-delay: 70ms;">

            <div class="metrics-grid" id="overview-metrics"></div>

        <p class="showcase-desc reveal-on-load" style="--reveal-delay: 150ms;" id="modules-desc">点击任意模块即可进入独立页面，查看大图展示与完整能力说明。</p>

        <section class="modules-showcase" id="modules-showcase" aria-label="Ksword 模块展厅"></section>

    </div>

    <!-- 脚本顺序：数据 -> 语言 -> 主题 -> 总览渲染。 -->
    <script src="../js/tabs-data.js"></script>
    <script src="../js/lang.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/overview.js"></script>
