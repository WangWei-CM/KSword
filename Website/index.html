<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ksword5.1 Launch</title>
    <!-- 主页样式：发布会舞台风格 + 深浅主题变量。 -->
    <link rel="stylesheet" href="./css/site.css">
</head>
<body class="landing-page">
    <div class="page-shell">
        <header class="brand-topbar reveal-on-load" style="--reveal-delay: 20ms;">
            <a class="brand-mark" href="./index.html">Ksword5.1</a>
            <div class="topbar-actions">
                <a class="action-button" id="landing-overview-link" href="./pages/overview.html" title="进入模块展厅">产品总览</a>
                <button class="lang-button" type="button" data-lang-toggle title="切换中英文" aria-label="切换中英文">EN</button>
                <button class="icon-button" type="button" data-theme-toggle title="切换深浅模式" aria-label="切换深浅模式">☾</button>
            </div>
        </header>

        <main class="launch-hero">
            <section class="launch-copy reveal-on-load" style="--reveal-delay: 90ms;">
                <p class="launch-kicker" id="landing-kicker">KSWORD 5.1 发布主页</p>
                <h1 class="launch-title" id="landing-slogan">Windows 深度调试，像发布会一样直观</h1>
                <p class="launch-subtitle" id="landing-subtitle">面向进程、网络、内存、内核与系统治理的一体化平台。</p>

                <ul class="launch-metrics">
                    <li id="landing-metric-1">16 个主功能 Tab</li>
                    <li id="landing-metric-2">4 个辅助面板</li>
                    <li id="landing-metric-3">浅色 / 深色 + 中英双语</li>
                </ul>

                <div class="launch-actions">
                    <a class="action-button primary" id="landing-cta-primary" href="./pages/overview.html" title="进入模块展厅">进入模块展厅</a>
                    <a class="action-button" id="landing-cta-secondary" href="./Images/截图命名与拍摄说明.txt" title="查看截图规范">查看截图规范</a>
                </div>

                <p class="launch-scroll-tip" id="landing-scroll-tip">每个能力板块都提供独立页面与大图展示。</p>
            </section>

            <section class="launch-visual reveal-on-load" style="--reveal-delay: 170ms;">
                <figure class="product-stage">
                    <img
                        class="stage-image"
                        src="./Images/Logo.png"
                        alt="Ksword5.1 发布会主视觉"
                        onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
                    >
                    <div class="stage-fallback">KSWORD 5.1</div>
                    <figcaption class="stage-caption" id="landing-stage-caption">产品主视觉（可替换为宣传大图）</figcaption>
                </figure>
            </section>
        </main>

        <section class="landing-changelog reveal-on-load" style="--reveal-delay: 230ms;" aria-label="Website Changelog">
            <div class="landing-changelog-head">
                <h2 class="landing-changelog-title" id="landing-changelog-title">更新日志</h2>
                <p class="landing-changelog-desc" id="landing-changelog-desc">读取网站根目录 change.log 文件内容。</p>
            </div>
            <pre class="landing-changelog-content" id="landing-changelog-content">正在读取 change.log ...</pre>
        </section>
    </div>

    <!-- 脚本顺序：语言 -> 主题 -> 首页文案。 -->
    <script src="./js/lang.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/landing.js"></script>
</body>
</html>
